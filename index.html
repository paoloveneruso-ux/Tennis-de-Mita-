<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tennis Club Lello de Mita — Campi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#EFEEE6;--ink-dim:#A9B3AC;--board:#122019;--board-2:#182B22;--board-3:#1F3A2C;--line:#33493C;
    --clay:#B5602F;--clay-dim:#7C4726;--chalk:#F4F1E6;--ball:#D7E85C;--ball-dim:#7C8534;--danger:#C1533B;
    --radius:10px;--font-display:'Oswald',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--board);
    background-image:radial-gradient(circle at 15% 0%, rgba(215,232,92,0.05), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    color:var(--ink);font-family:var(--font-body);min-height:100vh;-webkit-font-smoothing:antialiased;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:40px;}
  .court-header{padding:22px 18px 14px;border-bottom:1px solid var(--line);position:relative;}
  .court-header .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ball);opacity:.85;margin-bottom:6px;}
  .court-header h1{font-family:var(--font-display);font-weight:600;font-size:24px;letter-spacing:.01em;margin:0;text-transform:uppercase;}
  .court-line{height:2px;background:linear-gradient(90deg,var(--clay),transparent 70%);margin-top:14px;position:relative;}
  .court-line::before{content:"";position:absolute;left:0;top:-5px;width:2px;height:12px;background:var(--clay);}
  .court-line::after{content:"";position:absolute;right:0;top:-5px;width:2px;height:12px;background:var(--clay);opacity:.15;}
  .screen{padding:18px;flex:1;display:flex;flex-direction:column;gap:16px;}
  .card{background:var(--board-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);}
  input,select{background:var(--board);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:11px 12px;font-size:15px;font-family:var(--font-body);width:100%;}
  input:focus,select:focus{outline:none;border-color:var(--ball-dim);}
  button{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;font-weight:600;border:none;border-radius:8px;padding:12px 16px;font-size:14px;cursor:pointer;transition:transform .1s ease, opacity .15s;}
  button:active{transform:scale(0.97);}
  button:disabled{opacity:.35;cursor:default;}
  .btn-primary{background:var(--ball);color:#16220F;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-danger{background:var(--danger);color:var(--chalk);}
  .btn-clay{background:var(--clay);color:var(--chalk);}
  .hint{font-size:12.5px;color:var(--ink-dim);line-height:1.5;}
  .error-box{background:rgba(193,83,59,.12);border:1px solid var(--danger);color:#F0B3A6;padding:10px 12px;border-radius:8px;font-size:13px;}
  .tabbar{display:flex;border-top:1px solid var(--line);background:var(--board-2);position:sticky;bottom:0;}
  .tabbar button{flex:1;background:transparent;border:none;border-radius:0;color:var(--ink-dim);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:13px 6px;}
  .tabbar button.active{color:var(--ball);}
  .day-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .day-chip{flex:0 0 auto;background:var(--board);border:1px solid var(--line);border-radius:8px;padding:9px 12px;text-align:center;min-width:56px;cursor:pointer;}
  .day-chip .d{font-family:var(--font-mono);font-size:10px;color:var(--ink-dim);text-transform:uppercase;}
  .day-chip .n{font-family:var(--font-display);font-size:18px;}
  .day-chip.active{border-color:var(--ball);background:rgba(215,232,92,.08);}
  .day-chip.active .d,.day-chip.active .n{color:var(--ball);}
  .court-block{margin-bottom:18px;}
  .court-block h3{font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;color:var(--chalk);display:flex;align-items:center;gap:8px;}
  .court-block h3::before{content:"";width:10px;height:10px;border:1.5px solid var(--clay);border-radius:2px;}
  .slot-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px;}
  .slot{font-family:var(--font-mono);font-size:12.5px;text-align:center;padding:9px 4px;border-radius:6px;border:1px solid var(--line);background:var(--board);color:var(--ink-dim);cursor:pointer;position:relative;}
  .slot.free:hover{border-color:var(--ball-dim);}
  .slot.mine{background:rgba(215,232,92,.14);border-color:var(--ball);color:var(--ball);font-weight:600;}
  .slot.taken{background:rgba(255,255,255,.03);color:var(--ink-dim);cursor:default;opacity:.6;}
  .slot.taken .who{display:block;font-size:9px;margin-top:2px;opacity:.8;}
  .slot.blocked{background:repeating-linear-gradient(45deg,var(--board),var(--board) 4px,rgba(193,83,59,.15) 4px,rgba(193,83,59,.15) 8px);color:#C99;cursor:default;border-color:var(--clay-dim);}
  .slot.past{opacity:.25;cursor:default;}
  .slot .mode-tag{display:block;font-size:8.5px;margin-top:1px;letter-spacing:.04em;text-transform:uppercase;opacity:.75;}
  .today-tally{display:flex;justify-content:space-between;align-items:center;background:var(--board);border:1px solid var(--line);border-radius:8px;padding:12px 14px;}
  .today-tally .num{font-family:var(--font-mono);font-size:22px;color:var(--ball);}
  .today-tally .lbl{font-size:12px;color:var(--ink-dim);}
  .who-bar{display:flex;justify-content:space-between;align-items:center;padding:2px 2px 0;}
  .who-bar .me{font-size:13px;color:var(--ink-dim);}
  .who-bar .me b{color:var(--chalk);font-weight:600;}
  .link{color:var(--ball);background:none;border:none;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:4px 0;text-decoration:underline;cursor:pointer;}
  .member-row,.list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:10px;}
  .member-row:last-child,.list-row:last-child{border-bottom:none;}
  .member-row .name{font-weight:600;font-size:14.5px;}
  .pill{font-family:var(--font-mono);font-size:12px;background:var(--board);border:1px solid var(--line);border-radius:20px;padding:4px 10px;color:var(--ball);white-space:nowrap;}
  .pill.adminpill{color:var(--clay);border-color:var(--clay-dim);}
  .small-btn{background:transparent;border:1px solid var(--line);color:var(--ink-dim);padding:6px 9px;font-size:11px;border-radius:6px;white-space:nowrap;}
  .section-title{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-dim);margin-bottom:4px;}
  .mode-choice{display:flex;gap:8px;}
  .mode-choice button{flex:1;background:var(--board);border:1px solid var(--line);color:var(--ink-dim);padding:10px 4px;font-size:12px;}
  .mode-choice button.sel{border-color:var(--ball);color:var(--ball);background:rgba(215,232,92,.08);}
  .period-strip{display:flex;gap:8px;}
  .period-strip button{flex:1;background:var(--board);border:1px solid var(--line);color:var(--ink-dim);padding:9px 4px;font-size:11.5px;}
  .period-strip button.sel{border-color:var(--ball);color:var(--ball);background:rgba(215,232,92,.08);}
  .totale-box{background:var(--board);border:1px solid var(--ball-dim);border-radius:8px;padding:14px;display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;}
  .totale-box .l{font-size:12px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono);}
  .totale-box .v{font-family:var(--font-display);font-size:22px;color:var(--ball);}
  .loading{display:flex;align-items:center;justify-content:center;flex:1;color:var(--ink-dim);font-family:var(--font-mono);font-size:13px;text-align:center;padding:0 30px;}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--board-3);border:1px solid var(--ball-dim);color:var(--chalk);padding:10px 16px;border-radius:8px;font-size:13px;z-index:80;animation:fadeUp .25s ease;max-width:85%;text-align:center;}
  @keyframes fadeUp{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>
<div id="app"><div class="loading">Accesso in corso…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, update, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ================= Firebase config ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDczkY7RlTAVWaf45OiEzErUCtJmqswsNM",
  authDomain: "tc-de-mita.firebaseapp.com",
  databaseURL: "https://tc-de-mita-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tc-de-mita",
  storageBucket: "tc-de-mita.firebasestorage.app",
  messagingSenderId: "415310594815",
  appId: "1:415310594815:web:d03e2d7502f19fca6042ca"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

/* ================= Circolo fisso ================= */
const CLUB_NAME = "Tennis Club Lello de Mita";
const CLUB_PATH = "lellodemita";
const DEFAULT_COURTS = [ {id:'A', name:'Campo A'}, {id:'B', name:'Campo B'} ];
const DEFAULT_RATES = { normale: 10, lezione: 25, doppio: 16 };
const MODES = [
  {id:'normale', label:'Ora normale'},
  {id:'lezione', label:'Lezione (maestro)'},
  {id:'doppio', label:'Ora doppio'},
];
const modeLabel = id => (MODES.find(m=>m.id===id)||{}).label || id;

const MIN_CANCEL_HOURS = 24;
const MAX_ADVANCE_DAYS = 7;
const OPEN_HOUR = 8;
const CLOSE_HOUR = 22;
const IT_DOW = ['DOM','LUN','MAR','MER','GIO','VEN','SAB'];
const WEEKDAY_FULL = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];

function cpath(p){ return 'clubs/'+CLUB_PATH+(p?('/'+p):''); }
function dateKey(d){ return d.toISOString().slice(0,10); }
function fmtDateDisplay(dateStr){ const [y,m,d] = dateStr.split('-'); return d+'-'+m+'-'+y; }
function todayKey(){ return dateKey(new Date()); }
function fmtDay(d){ return { dow: IT_DOW[d.getDay()], num: d.getDate() }; }
function slotDateTime(dateStr, hour){ return new Date(dateStr+'T'+String(hour).padStart(2,'0')+':00:00'); }
function yearMonth(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function currentYearMonth(){ return yearMonth(new Date()); }
const IT_MONTHS = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
function fmtMonth(ym){ const [y,m] = ym.split('-'); return IT_MONTHS[parseInt(m,10)-1]+' '+y; }
function normalizePhone(phone){
  let d = (phone||'').replace(/[^\d]/g,'');
  if(d.startsWith('0039')) d = d.slice(2);
  else if(d.length===10 && d.startsWith('3')) d = '39'+d;
  return d;
}
function buildWhatsAppReminderUrl(phone, studentName, courseName, monthLabel, fee){
  const digits = normalizePhone(phone);
  const msg = `Ciao ${studentName}, ti scrivo dal ${CLUB_NAME} per ricordarti che la quota di "${courseName}" per ${monthLabel} (€ ${fee}) risulta ancora da saldare. Grazie!`;
  return `https://wa.me/${digits}?text=${encodeURIComponent(msg)}`;
}
function monthsBetween(startDateStr, endDateStr){
  const out = [];
  const capEnd = yearMonth(new Date()) < endDateStr.slice(0,7) ? yearMonth(new Date()) : endDateStr.slice(0,7);
  let [y,m] = startDateStr.slice(0,7).split('-').map(Number);
  const [ey,em] = capEnd.split('-').map(Number);
  while(y<ey || (y===ey && m<=em)){
    out.push(y+'-'+String(m).padStart(2,'0'));
    m++; if(m>12){m=1;y++;}
  }
  return out;
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}

/* ================= Stato ================= */
const state = {
  uid: null,
  authChecked: false,
  authMode: 'login',
  club: null,
  admins: {},
  isAdmin: false,
  teachers: {},
  isTeacher: false,
  members: {},
  bookingsPublic: {},
  bookingsPrivate: {},   // popolato solo se admin
  myBookingIds: {},
  blocks: {},
  courses: {},
  courseEnrollments: {}, // popolato on-demand per il corso aperto
  courseAttendance: {},  // popolato on-demand per corso+sessione aperti
  coursePayments: {},    // { [cid]: { [eid]: { 'YYYY-MM': true|false } } }
  myEnrollments: {},      // { [cid]: eid }
  me: null,
  selectedDate: todayKey(),
  selectedMode: 'normale',
  tab: 'campi',
  adminPeriod: 'oggi',
  openCourseId: null,
  attendanceCourseId: null,
  attendanceDate: null,
  paymentMonth: currentYearMonth(),
};
let privateListenerAttached = false;
let fatalShown = false;
const root = document.getElementById('app');

function showFatalError(err){
  if(fatalShown) return;
  fatalShown = true;
  root.innerHTML = `
    <div class="screen">
      <div class="error-box">
        <b>Errore di connessione al database:</b><br>${err && err.message ? err.message : err}
      </div>
      <div class="hint">
        Controlla questi due punti su Firebase:<br>
        1) Authentication → Sign-in method → "Email/Password" deve essere <b>attivato</b>.<br>
        2) Realtime Database → Regole: dopo aver incollato le regole, devi cliccare <b>Pubblica</b> in alto a destra, altrimenti non vengono salvate.<br><br>
        Se il messaggio dice "Permission denied", il problema è quasi certamente il punto 2.
      </div>
      <button class="btn-primary" id="retryBtn">Riprova</button>
    </div>`;
  const btn = document.getElementById('retryBtn');
  if(btn) btn.onclick = () => { fatalShown = false; location.reload(); };
}

/* ================= Bootstrap ================= */
function boot(){
  onAuthStateChanged(auth, async (user) => {
    state.authChecked = true;
    if(!user){
      state.uid = null;
      renderCurrent();
      return;
    }
    state.uid = user.uid;
    try{
      await ensureBootstrap();
    }catch(e){
      console.error('Bootstrap error', e);
      showFatalError(e);
      return;
    }
    attachListeners();
  });
}

async function ensureBootstrap(){
  const adminsSnap = await get(ref(db, cpath('admins')));
  if(!adminsSnap.exists()){
    await set(ref(db, cpath('admins/'+state.uid)), true);
  }
  const meAdminSnap = await get(ref(db, cpath('admins/'+state.uid)));
  if(meAdminSnap.exists() && meAdminSnap.val()===true){
    const infoSnap = await get(ref(db, cpath('info')));
    if(!infoSnap.exists()){
      await set(ref(db, cpath('info')), { name: CLUB_NAME, courts: DEFAULT_COURTS, rates: DEFAULT_RATES, createdAt: Date.now() });
    }
  }
}

/* ================= Login / Registrazione ================= */
function renderAuthScreen(){
  const isRegister = state.authMode === 'register';
  root.innerHTML = `
    <div class="court-header">
      <div class="eyebrow">${CLUB_NAME}</div>
      <h1>${isRegister ? 'Registrati' : 'Accedi'}</h1>
      <div class="court-line"></div>
    </div>
    <div class="screen">
      <div class="card" style="display:flex;flex-direction:column;gap:12px;">
        ${isRegister ? `<div class="field"><label>Nome e cognome</label><input id="authName" placeholder="Nome e cognome"></div>` : ''}
        <div class="field"><label>Email</label><input id="authEmail" type="email" placeholder="tuaemail@esempio.it"></div>
        <div class="field"><label>Password</label><input id="authPass" type="password" placeholder="${isRegister?'Almeno 6 caratteri':'••••••••'}"></div>
        <div id="authErr"></div>
        <button class="btn-primary" id="authSubmit">${isRegister ? 'Crea account' : 'Accedi'}</button>
        ${!isRegister ? `<button class="link" id="forgotBtn" style="align-self:center;">Password dimenticata?</button>` : ''}
      </div>
      <button class="link" id="toggleAuthMode" style="align-self:center;">${isRegister ? 'Hai già un account? Accedi' : 'Non hai un account? Registrati'}</button>
    </div>`;

  document.getElementById('toggleAuthMode').onclick = () => {
    state.authMode = isRegister ? 'login' : 'register';
    renderAuthScreen();
  };

  document.getElementById('authSubmit').onclick = async () => {
    const email = document.getElementById('authEmail').value.trim();
    const pass = document.getElementById('authPass').value;
    const errBox = document.getElementById('authErr');
    errBox.innerHTML = '';
    if(!email || !pass){ errBox.innerHTML = `<div class="error-box">Inserisci email e password.</div>`; return; }
    try{
      if(isRegister){
        const name = document.getElementById('authName').value.trim();
        if(!name){ errBox.innerHTML = `<div class="error-box">Inserisci il tuo nome.</div>`; return; }
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await set(ref(db, cpath('members/'+cred.user.uid)), { name, uid: cred.user.uid, createdAt: Date.now() });
      } else {
        await signInWithEmailAndPassword(auth, email, pass);
      }
    }catch(e){
      errBox.innerHTML = `<div class="error-box">${translateAuthError(e)}</div>`;
    }
  };

  const forgotBtn = document.getElementById('forgotBtn');
  if(forgotBtn) forgotBtn.onclick = async () => {
    const email = document.getElementById('authEmail').value.trim();
    if(!email){ toast('Inserisci prima la tua email'); return; }
    try{ await sendPasswordResetEmail(auth, email); toast('Email di recupero inviata'); }
    catch(e){ toast(translateAuthError(e)); }
  };
}

function translateAuthError(e){
  const code = e && e.code || '';
  const map = {
    'auth/email-already-in-use': 'Questa email è già registrata. Prova ad accedere.',
    'auth/invalid-email': 'Email non valida.',
    'auth/weak-password': 'Password troppo corta (minimo 6 caratteri).',
    'auth/wrong-password': 'Password errata.',
    'auth/invalid-credential': 'Email o password errate.',
    'auth/user-not-found': 'Nessun account con questa email.',
    'auth/too-many-requests': 'Troppi tentativi, riprova tra poco.',
  };
  return map[code] || (e && e.message) || 'Errore sconosciuto.';
}

function doLogout(){
  signOut(auth);
}

function attachListeners(){
  onValue(ref(db, cpath('info')), s=>{ state.club = s.val(); renderCurrent(); }, showFatalError);
  onValue(ref(db, cpath('admins')), s=>{
    state.admins = s.val()||{};
    state.isAdmin = !!state.admins[state.uid];
    if(state.isAdmin && !privateListenerAttached){
      privateListenerAttached = true;
      onValue(ref(db, cpath('bookingsPrivate')), s2=>{ state.bookingsPrivate = s2.val()||{}; renderCurrent(); }, err=>console.error('bookingsPrivate', err));
    }
    renderCurrent();
  }, showFatalError);
  onValue(ref(db, cpath('members')), s=>{ state.members = s.val()||{}; determineMe(); renderCurrent(); }, showFatalError);
  onValue(ref(db, cpath('bookingsPublic')), s=>{ state.bookingsPublic = s.val()||{}; renderCurrent(); }, showFatalError);
  onValue(ref(db, cpath('blocks')), s=>{ state.blocks = s.val()||{}; renderCurrent(); }, showFatalError);
  onValue(ref(db, cpath('myBookings/'+state.uid)), s=>{ state.myBookingIds = s.val()||{}; renderCurrent(); }, showFatalError);
  onValue(ref(db, cpath('teachers')), s=>{ state.teachers = s.val()||{}; state.isTeacher = !!state.teachers[state.uid]; renderCurrent(); }, showFatalError);
  onValue(ref(db, cpath('courses')), s=>{ state.courses = s.val()||{}; renderCurrent(); }, showFatalError);
  onValue(ref(db, cpath('myEnrollments/'+state.uid)), s=>{
    state.myEnrollments = s.val()||{};
    Object.entries(state.myEnrollments).forEach(([cid,eid])=> loadCoursePayment(cid, eid));
    renderCurrent();
  }, showFatalError);
}

function loadCoursePayment(cid, eid){
  onValue(ref(db, cpath('coursePayments/'+cid+'/'+eid)), s=>{
    if(!state.coursePayments[cid]) state.coursePayments[cid] = {};
    state.coursePayments[cid][eid] = s.val()||{};
    renderCurrent();
  }, err=>console.error('coursePayments', err));
}

function loadCoursePaymentsForCourse(cid){
  onValue(ref(db, cpath('coursePayments/'+cid)), s=>{
    state.coursePayments[cid] = s.val()||{};
    renderCurrent();
  }, err=>console.error('coursePayments', err));
}

function isTeacherOfCourse(cid){
  const c = state.courses[cid];
  return !!(c && state.teachers[state.uid] && c.teacherUid === state.uid);
}

function loadCourseEnrollments(cid){
  onValue(ref(db, cpath('courseEnrollments/'+cid)), s=>{
    state.courseEnrollments[cid] = s.val()||{};
    renderCurrent();
  }, err=>console.error('enrollments', err));
}

function loadCourseAttendance(cid, dateStr){
  const key = cid+'|'+dateStr;
  onValue(ref(db, cpath('courseAttendance/'+cid+'/'+dateStr)), s=>{
    state.courseAttendance[key] = s.val()||{};
    renderCurrent();
  }, err=>console.error('attendance', err));
}

function courseCoversSlot(course, courtId, dateStr, hour){
  if(course.courtId !== courtId) return false;
  if(course.hour !== hour) return false;
  const d = new Date(dateStr+'T00:00:00');
  if(course.weekday !== d.getDay()) return false;
  if(dateStr < course.startDate || dateStr > course.endDate) return false;
  return true;
}

function determineMe(){
  const found = Object.entries(state.members||{}).find(([_,m]) => m.uid === state.uid);
  state.me = found ? found[0] : null;
}

function renderCurrent(){
  if(!state.authChecked){ root.innerHTML = `<div class="loading">Verifico l'accesso…</div>`; return; }
  if(!state.uid){ renderAuthScreen(); return; }
  if(!state.club) { root.innerHTML = `<div class="loading">Carico il circolo…</div>`; return; }
  if(!state.me){ renderCompleteProfile(); } else { renderApp(); }
}

/* ================= Prenotazioni (senza rivelare l'identità) ================= */
async function bookSlot(court, hour, meObj){
  const bid = push(ref(db, cpath('bookingsPublic'))).key;
  try{
    await set(ref(db, cpath('bookingsPrivate/'+bid)), {
      courtId:court.id, date:state.selectedDate, hour, mode:state.selectedMode,
      rate: state.club.rates[state.selectedMode], memberId: state.me, memberName: meObj.name,
      uid: state.uid, createdAt: Date.now()
    });
    await set(ref(db, cpath('myBookings/'+state.uid+'/'+bid)), true);
    await set(ref(db, cpath('bookingsPublic/'+bid)), { courtId:court.id, date:state.selectedDate, hour, mode:state.selectedMode });
    toast('Campo prenotato: '+String(hour).padStart(2,'0')+':00 · '+modeLabel(state.selectedMode));
  }catch(e){ toast('Errore nella prenotazione: '+e.message); }
}

async function cancelBooking(bid, ownerUid){
  try{
    await remove(ref(db, cpath('bookingsPublic/'+bid)));
    await Promise.all([
      remove(ref(db, cpath('bookingsPrivate/'+bid))),
      remove(ref(db, cpath('myBookings/'+ownerUid+'/'+bid)))
    ]);
    toast('Prenotazione annullata');
  }catch(e){ toast('Errore: '+e.message); }
}

/* ================= Vista Campi ================= */
function renderCourts(host){
  const meObj = state.members[state.me] || {name:'Socio'};
  const now = new Date();
  const maxBookable = new Date(now.getTime() + MAX_ADVANCE_DAYS*24*3600*1000);
  const days = Array.from({length:MAX_ADVANCE_DAYS+1}, (_,i)=>{ const d = new Date(); d.setDate(d.getDate()+i); return d; });

  const myHoursToday = Object.keys(state.myBookingIds||{}).filter(bid=>{
    const b = state.bookingsPublic[bid]; return b && b.date===todayKey();
  }).length;

  const screen = document.createElement('div');
  screen.className = 'screen';
  screen.innerHTML = `
    <div class="who-bar">
      <div class="me">Prenoti come <b>${meObj.name}</b></div>
      <button class="link" id="notMe">esci</button>
    </div>
    <div class="today-tally">
      <div><div class="lbl">Ore giocate oggi</div></div>
      <div class="num">${myHoursToday}h</div>
    </div>
    <div class="card" style="padding:12px 14px;">
      <div class="section-title" style="margin-bottom:8px;">Modalità di prenotazione</div>
      <div class="mode-choice" id="modeChoice">
        ${MODES.map(m=>`<button data-mode="${m.id}" class="${state.selectedMode===m.id?'sel':''}">${m.label}${state.isAdmin?`<br><span style="opacity:.7;">€ ${state.club.rates[m.id]}/h</span>`:''}</button>`).join('')}
      </div>
    </div>
    <div class="day-strip" id="dayStrip"></div>
    <div id="courtsHost"></div>
  `;
  host.replaceChildren(screen);

  screen.querySelector('#modeChoice').querySelectorAll('button').forEach(b=>{
    b.onclick = () => { state.selectedMode = b.dataset.mode; renderApp(); };
  });

  const strip = screen.querySelector('#dayStrip');
  days.forEach(d=>{
    const k = dateKey(d); const f = fmtDay(d);
    const chip = document.createElement('div');
    chip.className = 'day-chip' + (k===state.selectedDate ? ' active' : '');
    chip.innerHTML = `<div class="d">${f.dow}</div><div class="n">${f.num}</div>`;
    chip.onclick = () => { state.selectedDate = k; renderApp(); };
    strip.appendChild(chip);
  });

  const courtsHost = screen.querySelector('#courtsHost');
  (state.club.courts||[]).forEach(court => {
    const block = document.createElement('div');
    block.className = 'court-block';
    const title = document.createElement('h3'); title.textContent = court.name;
    block.appendChild(title);
    const row = document.createElement('div'); row.className = 'slot-row';

    for(let h=OPEN_HOUR; h<CLOSE_HOUR; h++){
      const slotEl = document.createElement('div');
      const thisSlotTime = slotDateTime(state.selectedDate, h);
      const isPast = thisSlotTime <= now;
      const tooFarAhead = thisSlotTime > maxBookable;
      const label = String(h).padStart(2,'0')+':00';

      const bookingEntry = Object.entries(state.bookingsPublic||{}).find(([_,b])=>
        b.courtId===court.id && b.date===state.selectedDate && b.hour===h
      );
      const blockEntry = Object.entries(state.blocks||{}).find(([_,b])=>
        b.courtId===court.id && b.date===state.selectedDate && b.hour===h
      );
      const courseEntry = Object.entries(state.courses||{}).find(([_,c])=>
        courseCoversSlot(c, court.id, state.selectedDate, h)
      );

      if(blockEntry){
        slotEl.className = 'slot blocked';
        slotEl.innerHTML = `${label}<span class="who">chiuso</span>`;
      } else if(courseEntry){
        const [,c] = courseEntry;
        slotEl.className = 'slot blocked';
        slotEl.innerHTML = `${label}<span class="who">Corso</span>`;
        slotEl.title = c.name;
      } else if(bookingEntry){
        const [bid, b] = bookingEntry;
        const mine = !!state.myBookingIds[bid];
        slotEl.className = 'slot ' + (mine ? 'mine' : 'taken') + (isPast?' past':'');
        const modeTag = `<span class="mode-tag">${b.mode||''}</span>`;
        slotEl.innerHTML = `${label}<span class="who">${mine?'tu':'occupato'}</span>${modeTag}`;
        if(mine && !isPast){
          const hoursUntil = (thisSlotTime - now)/3600000;
          const canCancel = hoursUntil >= MIN_CANCEL_HOURS;
          slotEl.style.cursor = canCancel ? 'pointer' : 'default';
          slotEl.onclick = () => {
            if(!canCancel){ toast("Non annullabile: mancano meno di 24h all'orario prenotato"); return; }
            if(confirm('Annullare la prenotazione delle '+label+'?')) cancelBooking(bid, state.uid);
          };
        }
      } else if(isPast){
        slotEl.className = 'slot past'; slotEl.textContent = label;
      } else if(tooFarAhead){
        slotEl.className = 'slot past'; slotEl.textContent = label;
        slotEl.title = 'Prenotabile da '+MAX_ADVANCE_DAYS+' giorni prima';
      } else {
        slotEl.className = 'slot free'; slotEl.textContent = label;
        slotEl.onclick = () => bookSlot(court, h, meObj);
      }
      row.appendChild(slotEl);
    }
    block.appendChild(row);
    courtsHost.appendChild(block);
  });

  screen.querySelector('#notMe').onclick = doLogout;
}

          btn.textContent = present ? 'Presente' : 'Assente';
          btn.onclick = async () => {
            try{ await set(ref(db, cpath('courseAttendance/'+cid+'/'+state.attendanceDate+'/'+eid)), !present); }
            catch(err){ toast('Errore: '+err.message); }
          };
          row.appendChild(btn);
          attListHost.appendChild(row);
        });
      }
    }
  }

  if(state.isAdmin){
    const createBtn = screen.querySelector('#createCourseBtn');
    if(createBtn) createBtn.onclick = async () => {
      const name = screen.querySelector('#cName').value.trim();
      const teacherUid = screen.querySelector('#cTeacher').value;
      const teacherName = teacherUid ? (allLinkedMembers.find(([_,m])=>m.uid===teacherUid)||[])[1]?.name : '';
      const courtId = screen.querySelector('#cCourt').value;
      const weekday = parseInt(screen.querySelector('#cWeekday').value,10);
      const hour = parseInt(screen.querySelector('#cHour').value,10);
      const startDate = screen.querySelector('#cStart').value;
      const endDate = screen.querySelector('#cEnd').value;
      const maxSeats = parseInt(screen.querySelector('#cMax').value,10) || 8;
      const monthlyFee = parseFloat(screen.querySelector('#cFee').value) || 0;
      if(!name) return toast('Inserisci il nome del corso');
      if(!startDate || !endDate){ toast('Inserisci data inizio e fine'); return; }
      try{
        if(teacherUid && !state.teachers[teacherUid]){
          await set(ref(db, cpath('teachers/'+teacherUid)), true);
        }
        const newRef = push(ref(db, cpath('courses')));
        await set(newRef, {
          name, teacherUid: teacherUid||null, teacherName: teacherName||'',
          courtId, weekday, hour, startDate, endDate, maxSeats, monthlyFee,
          enrolledCount: 0, createdAt: Date.now()
        });
        toast('Corso creato');
      }catch(e){ toast('Errore: '+e.message); }
    };
  }
}

function nextSessionDate(course){
  const now = new Date();
  for(let i=0;i<8;i++){
    const d = new Date(now); d.setDate(d.getDate()+i);
    if(d.getDay()===course.weekday){
      const k = dateKey(d);
      if(k>=course.startDate && k<=course.endDate) return k;
      return k; // fuori range ma ragionevole come default
    }
  }
  return todayKey();
}

/* ================= Vista Soci ================= */
function renderMembersScreen(host){
  const list = Object.entries(state.members||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  const screen = document.createElement('div');
  screen.className = 'screen';
  screen.innerHTML = `<div class="card"><div class="section-title">Anagrafica soci (${list.length})</div><div id="memList"></div></div>`;
  host.replaceChildren(screen);
  const memList = screen.querySelector('#memList');
  list.forEach(([id,m])=>{
    const row = document.createElement('div');
    row.className = 'member-row';
    const isAdm = !!state.admins[m.uid];
    row.innerHTML = `<span class="name">${m.name}${id===state.me?' · <span style="color:var(--ball);font-size:11px;">tu</span>':''}</span>${isAdm?'<span class="pill adminpill">Admin</span>':''}`;
    memList.appendChild(row);
  });
}

/* ================= Admin ================= */
function renderAdminScreen(host){
  if(!state.isAdmin){
    const screen = document.createElement('div');
    screen.className = 'screen';
    screen.innerHTML = `<div class="card"><div class="hint">Non sei amministratore di questo circolo. Chiedi a un amministratore esistente di promuoverti dalla sezione Soci → Amministratori.</div></div>`;
    host.replaceChildren(screen);
    return;
  }

  const now = new Date();
  const periodStart = {
    oggi: new Date(now.getFullYear(),now.getMonth(),now.getDate()),
    settimana: new Date(now.getTime()-7*24*3600*1000),
    tutto: new Date(0),
  }[state.adminPeriod];

  const allPrivate = Object.entries(state.bookingsPrivate||{});
  const inPeriod = allPrivate.filter(([_,b])=> slotDateTime(b.date,b.hour) >= periodStart);
  const totHours = inPeriod.length;
  const byMode = {}; MODES.forEach(m=> byMode[m.id] = {hours:0, revenue:0});
  let totRevenue = 0;
  inPeriod.forEach(([_,b])=>{
    const mode = b.mode || 'normale';
    if(!byMode[mode]) byMode[mode] = {hours:0,revenue:0};
    byMode[mode].hours += 1;
    const r = (typeof b.rate === 'number') ? b.rate : (state.club.rates[mode]||0);
    byMode[mode].revenue += r; totRevenue += r;
  });

  const dayBookings = allPrivate.filter(([_,b])=>b.date===state.selectedDate).sort((a,b)=>a[1].hour-b[1].hour);
  const memberList = Object.entries(state.members||{}).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  const screen = document.createElement('div');
  screen.className = 'screen';
  screen.innerHTML = `
    <div class="card">
      <div class="section-title">Contabilità ore e incasso</div>
      <div class="period-strip">
        <button data-p="oggi" class="${state.adminPeriod==='oggi'?'sel':''}">Oggi</button>
        <button data-p="settimana" class="${state.adminPeriod==='settimana'?'sel':''}">7 giorni</button>
        <button data-p="tutto" class="${state.adminPeriod==='tutto'?'sel':''}">Da sempre</button>
      </div>
      <div id="modeBreakdown" style="margin-top:10px;"></div>
      <div class="totale-box"><span class="l">Ore totali</span><span class="v">${totHours}h</span></div>
      <div class="totale-box"><span class="l">Incasso stimato</span><span class="v">€ ${totRevenue.toFixed(2)}</span></div>
    </div>

    <div class="card">
      <div class="section-title">Tariffe (€/ora)</div>
      <div id="ratesHost"></div>
      <button class="btn-ghost" id="saveRatesBtn" style="width:100%;margin-top:10px;">Salva tariffe</button>
    </div>

    <div class="card">
      <div class="section-title">Prenotazioni del ${fmtDateDisplay(state.selectedDate)} (${dayBookings.length})</div>
      <div id="bookingsHost">${dayBookings.length ? '' : '<div class="hint">Nessuna prenotazione.</div>'}</div>
    </div>

    <div class="card">
      <div class="section-title">Blocca uno slot (manutenzione / chiusura)</div>
      <div class="field"><label>Campo</label>
        <select id="blockCourt">${(state.club.courts||[]).map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Ora</label>
        <select id="blockHour">${Array.from({length:CLOSE_HOUR-OPEN_HOUR},(_,i)=>{const h=OPEN_HOUR+i;return `<option value="${h}">${String(h).padStart(2,'0')}:00</option>`;}).join('')}</select>
      </div>
      <button class="btn-clay" id="blockBtn" style="width:100%;margin-top:8px;">Blocca slot per il ${fmtDateDisplay(state.selectedDate)}</button>
    </div>

    <div class="card">
      <div class="section-title">Gestione soci</div>
      <div class="field"><label>Aggiungi socio</label><input id="addMemberName" placeholder="Nome e cognome"></div>
      <button class="btn-ghost" id="addMemberBtn" style="width:100%;">Aggiungi socio</button>
      <div id="memAdminList" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <div class="section-title">Amministratori</div>
      <div class="hint" style="margin-bottom:8px;">Chi diventa admin può gestire tariffe, soci, blocchi e cancellare qualunque prenotazione.</div>
      <div id="adminList"></div>
    </div>
  `;
  host.replaceChildren(screen);

  screen.querySelector('.period-strip').querySelectorAll('button').forEach(b=>{
    b.onclick = () => { state.adminPeriod = b.dataset.p; renderApp(); };
  });

  const modeBreakdown = screen.querySelector('#modeBreakdown');
  MODES.forEach(m=>{
    const d = byMode[m.id] || {hours:0,revenue:0};
    const row = document.createElement('div'); row.className='list-row';
    row.innerHTML = `<span>${m.label}</span><span class="pill">${d.hours}h · € ${d.revenue.toFixed(2)}</span>`;
    modeBreakdown.appendChild(row);
  });

  const ratesHost = screen.querySelector('#ratesHost');
  MODES.forEach(m=>{
    const row = document.createElement('div'); row.className='field'; row.style.marginBottom='8px';
    row.innerHTML = `<label>${m.label}</label><input type="number" min="0" step="0.5" id="rate_${m.id}" value="${state.club.rates[m.id]}">`;
    ratesHost.appendChild(row);
  });
  screen.querySelector('#saveRatesBtn').onclick = async () => {
    const newRates = {};
    MODES.forEach(m=>{ newRates[m.id] = parseFloat(screen.querySelector('#rate_'+m.id).value) || 0; });
    try{ await update(ref(db, cpath('info/rates')), newRates); toast('Tariffe aggiornate'); }
    catch(e){ toast('Errore: '+e.message); }
  };

  const bkHost = screen.querySelector('#bookingsHost');
  dayBookings.forEach(([bid,b])=>{
    const court = (state.club.courts||[]).find(c=>c.id===b.courtId);
    const row = document.createElement('div'); row.className='list-row';
    row.innerHTML = `<span>${String(b.hour).padStart(2,'0')}:00 · ${court?court.name:''} · ${b.memberName} · ${modeLabel(b.mode)}</span>`;
    const del = document.createElement('button'); del.className='small-btn'; del.textContent='Annulla';
    del.onclick = () => cancelBooking(bid, b.uid);
    row.appendChild(del);
    bkHost.appendChild(row);
  });

  screen.querySelector('#blockBtn').onclick = async () => {
    const courtId = screen.querySelector('#blockCourt').value;
    const hour = parseInt(screen.querySelector('#blockHour').value,10);
    const exists = Object.entries(state.bookingsPublic||{}).find(([_,b])=>b.courtId===courtId && b.date===state.selectedDate && b.hour===hour);
    if(exists){ toast('Quello slot ha già una prenotazione: annullala prima.'); return; }
    try{
      const newRef = push(ref(db, cpath('blocks')));
      await set(newRef, { courtId, date: state.selectedDate, hour, reason:'manutenzione' });
      toast('Slot bloccato');
    }catch(e){ toast('Errore: '+e.message); }
  };

  screen.querySelector('#addMemberBtn').onclick = async () => {
    const name = screen.querySelector('#addMemberName').value.trim();
    if(!name) return toast('Inserisci un nome');
    try{
      const newRef = push(ref(db, cpath('members')));
      await set(newRef, { name, createdAt: Date.now() });
      screen.querySelector('#addMemberName').value = '';
      toast('Socio aggiunto (dovrà collegarsi dal proprio dispositivo scegliendo il suo nome)');
    }catch(e){ toast('Errore: '+e.message); }
  };

  const memAdminList = screen.querySelector('#memAdminList');
  memberList.forEach(([id,m])=>{
    const row = document.createElement('div'); row.className = 'member-row';
    row.innerHTML = `<span class="name">${m.name}</span>`;
    const del = document.createElement('button'); del.className='small-btn'; del.textContent='Rimuovi';
    del.onclick = async () => {
      if(confirm('Rimuovere '+m.name+" dall'anagrafica? Le sue prenotazioni restano registrate.")){
        try{ await remove(ref(db, cpath('members/'+id))); }catch(e){ toast('Errore: '+e.message); }
      }
    };
    row.appendChild(del);
    memAdminList.appendChild(row);
  });

  const adminListHost = screen.querySelector('#adminList');
  const adminCount = Object.keys(state.admins||{}).length;
  memberList.filter(([_,m])=>m.uid).forEach(([id,m])=>{
    const uid = m.uid;
    const isAdm = !!state.admins[uid];
    const row = document.createElement('div'); row.className='member-row';
    row.innerHTML = `<span class="name">${m.name}</span>${isAdm?'<span class="pill adminpill">Admin</span>':''}`;
    const btn = document.createElement('button');
    btn.className = isAdm ? 'small-btn' : 'small-btn';
    btn.textContent = isAdm ? 'Rimuovi admin' : 'Rendi admin';
    btn.onclick = async () => {
      if(isAdm && adminCount<=1){ toast('Deve rimanere almeno un amministratore'); return; }
      try{
        if(isAdm) await remove(ref(db, cpath('admins/'+uid)));
        else await set(ref(db, cpath('admins/'+uid)), true);
      }catch(e){ toast('Errore: '+e.message); }
    };
    row.appendChild(btn);
    adminListHost.appendChild(row);
  });
}

boot();
</script>
